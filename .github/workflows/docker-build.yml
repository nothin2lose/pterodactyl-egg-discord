
name: Build and Push Docker Images

on:
  push:
    branches:
      - master
      - staging
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ["lts", "24", "22"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run dependency audit
        working-directory: ./projectdefaults
        run: yarn audit --level high || true

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ matrix.node_version == 'lts' && 'nothin2lose/discord-egg:latest' || format('nothin2lose/discord-egg:node-{0}', matrix.node_version) }}
          build-args: NODE_VERSION=${{ matrix.node_version }}

      - name: Scan image for vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.node_version == 'lts' && 'nothin2lose/discord-egg:latest' || format('nothin2lose/discord-egg:node-{0}', matrix.node_version) }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Create test index.js file
        run: echo 'console.log("OK")' > index.js

      - name: Test the Docker image
        run: |
          TAG=${{ matrix.node_version == 'lts' && 'nothin2lose/discord-egg:latest' || format('nothin2lose/discord-egg:node-{0}', matrix.node_version) }}
          output=$(docker run --rm -v ${{ github.workspace }}/index.js:/home/container/index.js -e STARTUP="node /home/container/index.js" $TAG 2>&1)
          echo "Container output: $output"
          if [[ "$output" == *"-- Server started"* && "$output" == *"OK"* ]]; then
            echo "Test passed for $TAG."
          else
            echo "Test failed for $TAG. Got: '$output'"
            exit 1
          fi

      - name: Push the Docker image
        if: github.ref == 'refs/heads/master'
        run: |
          TAG=${{ matrix.node_version == 'lts' && 'nothin2lose/discord-egg:latest' || format('nothin2lose/discord-egg:node-{0}', matrix.node_version) }}
          docker push $TAG

  build-test-and-push-snapshot:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run dependency audit
        working-directory: ./projectdefaults
        run: yarn audit --level high || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: nothin2lose/discord-egg:snapshot
          build-args: NODE_VERSION=lts

      - name: Create test index.js file
        run: echo 'console.log("OK")' > index.js

      - name: Test the Docker image
        run: |
          output=$(docker run --rm -v ${{ github.workspace }}/index.js:/home/container/index.js -e STARTUP="node /home/container/index.js" nothin2lose/discord-egg:snapshot 2>&1)
          echo "Container output: $output"
          if [[ "$output" == *"-- Server started"* && "$output" == *"OK"* ]]; then
            echo "Test passed."
          else
            echo "Test failed. Got: '$output'"
            exit 1
          fi

      - name: Push the Docker image
        run: docker push nothin2lose/discord-egg:snapshot
