
name: Test Pterodactyl Egg

on:
  push:
    branches:
      - master
      - staging
  pull_request:

jobs:
  test-egg-installation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq and dos2unix
        run: sudo apt-get update && sudo apt-get install -y jq dos2unix

      - name: Extract installation info from egg
        id: install_info
        run: |
          INSTALL_SCRIPT_RAW=$(jq -r '.scripts.installation.script' egg-discordjs.json)
          INSTALL_CONTAINER=$(jq -r '.scripts.installation.container' egg-discordjs.json)

          echo "--- Extracted Info for Debugging ---"
          echo "Container Image: ${INSTALL_CONTAINER}"
          echo "Installation Script Content:"
          echo "${INSTALL_SCRIPT_RAW}"
          echo "------------------------------------"

          echo -e "$INSTALL_SCRIPT_RAW" | dos2unix > install_script.sh
          chmod +x install_script.sh

          echo "container_image=$INSTALL_CONTAINER" >> $GITHUB_OUTPUT

      - name: Run installation script in a simulated environment
        run: |
          mkdir -p ./temp_server_files

          docker run --rm \
            -v $(pwd)/install_script.sh:/mnt/install_script.sh \
            -v $(pwd)/temp_server_files:/mnt/server \
            ${{ steps.install_info.outputs.container_image }} \
            bash /mnt/install_script.sh

      - name: Verify installation
        run: |
          echo "Checking that /mnt/server directory was created..."
          if [ -d "temp_server_files" ]; then
            echo "Installation successful: server directory exists."
          else
            echo "Installation failed: server directory was not created."
            exit 1
          fi
